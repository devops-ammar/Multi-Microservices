name: Multi-Microservices-Pipeline

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Choose "deploy" or "destroy"'
        required: true
        default: "deploy"
        type: choice
        options:
          - deploy
          - destroy
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  Quality-Assurance:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        ends: [backend, frontend]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6 #docs provide v6 is updated latest

      - name: Setup Node js
        uses: actions/setup-node@v6 #v6 according to docs
        with:
          node-version: 24 #latest lts version
      - name: Lint Development Code
        run: |
          cd todo-${{ matrix.ends }}
          npm ci --legacy-peer-deps
          npx eslint . || false # Stop on errs!

      - name: Lint Dockerfiles
        uses: hadolint/hadolint-action@v3.1.0
        with:
          recursive: true
          dockerfile: ./todo-${{ matrix.ends }}/Dockerfile

      - name: Lint Docker Compose
        run: docker compose -f docker-compose.yml config --quiet

      - name: Lint Kubernetes Manifests
        uses: stackrox/kube-linter-action@v1.0.4
        with:
          directory: ./k8s/
          config: ./k8s/.kube-linter.yml # to remove prod grad issues

      - name: Lint Helm
        run: helm lint ./todo-app-helm/

  Build-and-Push:
    needs: Quality-Assurance
    runs-on: ubuntu-latest
    strategy:
      matrix:
        ends: [backend, frontend]
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and Push
        uses: docker/build-push-action@v7
        with:
          context: ./todo-${{ matrix.ends }}/
          push: true
          build-args: ${{ matrix.ends == 'frontend' && 'VITE_BACKEND_URL=/api' || '' }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/todo-${{ matrix.ends }}:latest
            ghcr.io/${{ github.repository_owner }}/todo-${{ matrix.ends }}:${{ github.sha }}

      - name: Scan Vulnerabilities Using Trivy
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: "ghcr.io/${{ github.repository_owner }}/todo-${{ matrix.ends }}:${{ github.sha }}"
          format: "table"
          exit-code: "1"
          severity: "CRITICAL,HIGH"
          trivyignores: ./.trivyignore
  Deploy-to-AWS:
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'deploy'
    needs: Build-and-Push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.10"

      - name: Terraform Init & Apply (Create infrastructure)
        run: |
          cd terraform/aws
          terraform init
          terraform apply -auto-approve

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --region ${{ secrets.AWS_REGION }} --name eks-cluster

      - name: Setup Helm
        uses: azure/setup-helm@v4

      - name: Deploy application with Helm
        run: |
          helm upgrade --install todo-app ./todo-app-helm \
            --namespace todo-app \
            --create-namespace \
            --set backend.image=ghcr.io/${{ github.repository_owner }}/todo-backend:${{ github.sha }} \
            --set frontend.image=ghcr.io/${{ github.repository_owner }}/todo-frontend:${{ github.sha }}

  Destroy-AWS:
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'destroy'
    needs: Build-and-Push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.10"

      - name: Terraform Destroy
        run: |
          cd terraform/aws
          terraform init
          terraform destroy -auto-approve
