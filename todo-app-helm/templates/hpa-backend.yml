apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler

metadata:
  name: backend-hpa
  namespace: {{ .Values.namespace }}
  labels:
    app: multi-services

spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: todo-backend
  minReplicas: {{ .Values.hpa.minReplicas }} # or 1
  maxReplicas: {{ .Values.hpa.maxReplicas }} # 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.hpa.targetCPUUtilization }} # 50
