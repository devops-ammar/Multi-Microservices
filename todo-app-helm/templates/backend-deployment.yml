apiVersion: apps/v1
kind: Deployment

metadata:
  name: todo-backend
  namespace: {{ .Values.namespace }}
  labels:
    app: multi-services
    type: backend

spec:
  replicas: {{ .Values.backend.replicas }} # or use a number like 1
  selector:
    matchLabels:
      app: multi-services
      type: backend
  template:
    metadata:
      labels:
        app: multi-services
        type: backend
    spec:
      containers:
        - name: todo-backend
          image: {{ .Values.backend.image }}
          imagePullPolicy: IfNotPresent
          command: ["node", "bin/www"]
          ports:
            - containerPort: 3000
          env:
            - name: MONGO_URL
              valueFrom:
                secretKeyRef:
                    name: {{ .Release.Name }}-db-secret
                    key: mongo-url
            - name: REDIS_URL
              valueFrom:
                configMapKeyRef:
                    name: {{ .Release.Name }}-config
                    key: redis-url
        #   env:
        #     - name: MONGO_URL
        #       valueFrom:
        #         secretKeyRef:
        #           name: {{ .Release.Name }}-db-secret
        #           key: mongo-url
        #     #   value: "mongodb://admin:password@todo-mongo:27017/todos_db?authSource=admin"
        #     # - name: REDIS_URL
        #     #   value: "redis://todo-redis:6379"
        #     - name: REDIS_URL
        #       value: "redis://{{ .Values.redis.serviceName }}:6379"
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            failureThreshold: 3
            timeoutSeconds: 15
            periodSeconds: 30
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 10
            failureThreshold: 5
            timeoutSeconds: 30
            periodSeconds: 30
          resources:
            {{- toYaml .Values.backend.resources | nindent 12 }}
            # limits:
            #   memory: "256Mi"
            #   cpu: "500m"
            # requests:
            #   memory: "128Mi"
            #   cpu: "100m"
