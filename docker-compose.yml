services:
  mongo:
    image: mongo:8.2.5-noble
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
    networks:
      - todo-network
    volumes:
      - mongo-data:/data/db

  redis:
    image: redis:8.6-alpine
    restart: unless-stopped
    networks:
      - todo-network
    volumes:
      - redis-data:/data

  backend:
    build: ./todo-backend/
    restart: unless-stopped
    depends_on: [mongo, redis]
    env_file: ./todo-backend/.env
    networks:
      - todo-network

  frontend:
    build: ./todo-frontend/
    restart: unless-stopped
    depends_on: [backend]
    networks:
      - todo-network

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    depends_on: [frontend]
    ports:
      - "8080:80"
    networks:
      - todo-network
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

networks:
  todo-network:
    driver: bridge

volumes: 
  mongo-data:
  redis-data:
